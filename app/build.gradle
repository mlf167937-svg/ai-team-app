plugins {
    id 'com.android.application'
}

android {
    namespace 'com.example.aiteam'
    compileSdk 30

    defaultConfig {
        applicationId "com.example.aiteam"
        minSdk 21
        targetSdk 30
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.3.1'
    implementation 'androidx.core:core:1.6.0'
}
